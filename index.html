<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>동물계 분류 · 암기 마스터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --surface3: #22222e;
  --border: #2a2a3a;
  --border2: #3a3a4e;
  --ink: #e8e6f0;
  --muted: #8888a0;
  --faint: #555568;

  --basal: #7c8594;
  --basal-bg: #7c859412;
  --radial: #e8a040;
  --radial-bg: #e8a04012;
  --proto-loph: #e05a8a;
  --proto-loph-bg: #e05a8a12;
  --proto-ecdy: #c74040;
  --proto-ecdy-bg: #c7404012;
  --deutero: #4a9aee;
  --deutero-bg: #4a9aee12;

  --accent: #a078f0;
  --accent-dim: #a078f020;
  --correct: #40c880;
  --wrong: #e05050;

  --mono: 'Space Mono', ui-monospace, monospace;
  --sans: 'Noto Sans KR', system-ui, sans-serif;
  --r: 14px;
  --r2: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ─── Header ─── */
.header {
  padding: 40px 24px 0;
  max-width: 1100px;
  margin: 0 auto;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.header-icon {
  font-size: 32px;
  line-height: 1;
}
.header-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 4px 10px;
  border-radius: 6px;
}
.header h1 {
  font-size: clamp(26px, 5vw, 40px);
  font-weight: 900;
  letter-spacing: -.02em;
  line-height: 1.15;
  margin-bottom: 6px;
}
.header h1 span {
  font-family: var(--mono);
  font-weight: 400;
  font-style: italic;
  font-size: .45em;
  color: var(--faint);
  display: block;
  margin-top: 4px;
  letter-spacing: 0;
}
.header-desc {
  color: var(--muted);
  font-size: 14px;
  max-width: 62ch;
  margin-bottom: 20px;
}

/* ─── Tab navigation ─── */
.tabs {
  display: flex;
  gap: 4px;
  padding: 0 24px;
  max-width: 1100px;
  margin: 0 auto 24px;
  overflow-x: auto;
}
.tab {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 18px;
  border: none;
  background: transparent;
  color: var(--muted);
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: .15s;
}
.tab:hover { background: var(--surface2); color: var(--ink); }
.tab.active { background: var(--accent); color: #fff; }
.tab .tab-emoji { margin-right: 6px; }

/* ─── Panels ─── */
.panel { display: none; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
.panel.active { display: block; }

/* ═══════════════════════════════════════
   PANEL 1: FLOWCHART — Decision Tree
   ═══════════════════════════════════════ */
.flow-container { position: relative; }

.flow-level {
  display: flex;
  align-items: stretch;
  gap: 16px;
  margin-bottom: 12px;
}
.flow-question {
  flex: 0 0 auto;
  width: 200px;
  min-width: 160px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.flow-q-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--faint);
  margin-bottom: 4px;
}
.flow-q-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 14px 16px;
  width: 100%;
}
.flow-q-text::before {
  content: "◆ ";
  color: var(--accent);
}
.flow-branches {
  flex: 1 1 auto;
  display: flex;
  gap: 12px;
  min-width: 0;
}
.flow-branch {
  flex: 1 1 0;
  min-width: 0;
}
.flow-answer {
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  padding: 6px 12px;
  border-radius: 8px 8px 0 0;
  letter-spacing: .02em;
}
.flow-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 0 var(--r) var(--r);
  padding: 14px;
  height: calc(100% - 32px);
}
.flow-card-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 2px;
}
.flow-card-sci {
  font-family: var(--mono);
  font-style: italic;
  font-size: 11px;
  color: var(--faint);
  margin-bottom: 8px;
}
.flow-card-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.flow-trait {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.flow-card-examples {
  font-size: 12px;
  color: var(--muted);
}
.flow-card-examples b {
  color: var(--faint);
  font-weight: 600;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: .08em;
}
.flow-arrow {
  display: flex;
  justify-content: center;
  padding: 4px 0;
  color: var(--faint);
  font-size: 18px;
}

/* decision step-by-step */
.decision-step {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.decision-step::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}
.decision-step[data-color="basal"]::before { background: var(--basal); }
.decision-step[data-color="radial"]::before { background: var(--radial); }
.decision-step[data-color="proto-loph"]::before { background: var(--proto-loph); }
.decision-step[data-color="proto-ecdy"]::before { background: var(--proto-ecdy); }
.decision-step[data-color="deutero"]::before { background: var(--deutero); }
.decision-step[data-color="accent"]::before { background: var(--accent); }

.step-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.step-num {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-dim);
  width: 40px;
  height: 40px;
  display: grid;
  place-items: center;
  border-radius: 10px;
  flex-shrink: 0;
}
.step-question {
  font-size: 17px;
  font-weight: 700;
}
.step-connector {
  display: flex;
  justify-content: center;
  padding: 0 0 0 0;
  margin: -8px 0;
  position: relative;
  z-index: 1;
}
.step-connector-line {
  width: 2px;
  height: 28px;
  background: var(--border2);
}
.step-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.step-option {
  border: 2px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
  cursor: default;
  transition: .15s;
  position: relative;
}
.step-option:hover {
  border-color: var(--border2);
  background: var(--surface2);
}
.step-option-answer {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-option-answer .arrow-icon {
  font-size: 11px;
  color: var(--faint);
}
.step-option-result {
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 2px;
}
.step-option-sci {
  font-family: var(--mono);
  font-style: italic;
  font-size: 11px;
  color: var(--faint);
  margin-bottom: 6px;
}
.step-option-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.step-option-examples {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.step-option-examples .ex-chip {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 5px;
  background: var(--surface3);
  color: var(--ink);
}
.option-leads {
  margin-top: 8px;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

/* color accents for options */
.step-option[data-g="basal"] { border-left: 3px solid var(--basal); }
.step-option[data-g="radial"] { border-left: 3px solid var(--radial); }
.step-option[data-g="proto"] { border-left: 3px solid var(--proto-loph); }
.step-option[data-g="deutero"] { border-left: 3px solid var(--deutero); }
.step-option[data-g="loph"] { border-left: 3px solid var(--proto-loph); }
.step-option[data-g="ecdy"] { border-left: 3px solid var(--proto-ecdy); }
.step-option[data-g="continue"] {
  border-left: 3px solid var(--accent);
  background: var(--accent-dim);
}

/* ═══════════════════════════════════════
   PANEL 2: CARDS — Phylum Overview
   ═══════════════════════════════════════ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.phylum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: .2s;
}
.phylum-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
}
.phylum-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}
.phylum-card[data-group="basal"]::before { background: var(--basal); }
.phylum-card[data-group="radial"]::before { background: var(--radial); }
.phylum-card[data-group="proto-loph"]::before { background: var(--proto-loph); }
.phylum-card[data-group="proto-ecdy"]::before { background: var(--proto-ecdy); }
.phylum-card[data-group="deutero"]::before { background: var(--deutero); }

.pc-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}
.pc-emoji {
  font-size: 36px;
  line-height: 1;
  flex-shrink: 0;
}
.pc-titles { flex: 1; min-width: 0; }
.pc-rank {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--faint);
}
.pc-name {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.01em;
}
.pc-sci {
  font-family: var(--mono);
  font-style: italic;
  font-size: 12px;
  color: var(--faint);
}
.pc-path {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 12px;
}
.pc-path-chip {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  letter-spacing: .03em;
}
.pc-path-arrow {
  color: var(--faint);
  font-size: 10px;
  display: flex;
  align-items: center;
}
.pc-section {
  margin-bottom: 12px;
}
.pc-section:last-child { margin-bottom: 0; }
.pc-section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 6px;
}
.pc-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.pc-trait {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--ink);
}
.pc-trait.key-trait {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.pc-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.pc-example {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 7px;
  background: var(--surface3);
  color: var(--ink);
}
.pc-classes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pc-class {
  flex: 1 1 120px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}
.pc-class-name { font-size: 13px; font-weight: 700; }
.pc-class-sci { font-family: var(--mono); font-style: italic; font-size: 10px; color: var(--faint); }
.pc-class-ex { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════
   PANEL 3: QUIZ — Active Recall
   ═══════════════════════════════════════ */
.quiz-wrapper {
  max-width: 640px;
  margin: 0 auto;
}
.quiz-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.quiz-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width .3s;
}
.quiz-progress-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}
.quiz-score {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
}
.quiz-score-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 13px;
}
.quiz-score-item.correct { color: var(--correct); }
.quiz-score-item.wrong { color: var(--wrong); }

.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px 24px;
  margin-bottom: 16px;
}
.quiz-category {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.quiz-q {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  line-height: 1.4;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.quiz-opt {
  font-family: var(--sans);
  font-size: 14px;
  text-align: left;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
  transition: .15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.quiz-opt:hover:not(.answered) {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.quiz-opt .opt-key {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--muted);
  flex-shrink: 0;
}
.quiz-opt.correct-answer {
  border-color: var(--correct);
  background: #40c88015;
}
.quiz-opt.correct-answer .opt-key {
  background: var(--correct);
  color: #fff;
}
.quiz-opt.wrong-answer {
  border-color: var(--wrong);
  background: #e0505015;
}
.quiz-opt.wrong-answer .opt-key {
  background: var(--wrong);
  color: #fff;
}
.quiz-opt.answered { cursor: default; pointer-events: none; }
.quiz-opt.dimmed { opacity: .4; }

.quiz-explanation {
  margin-top: 16px;
  padding: 14px 16px;
  background: var(--surface2);
  border-radius: var(--r2);
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.quiz-explanation.show { display: block; }
.quiz-explanation b { color: var(--ink); font-weight: 600; }

.quiz-next {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  padding: 12px 24px;
  border: none;
  border-radius: var(--r2);
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: none;
  margin-top: 16px;
}
.quiz-next.show { display: inline-block; }
.quiz-next:hover { filter: brightness(1.1); }

.quiz-result {
  text-align: center;
  padding: 40px 20px;
}
.quiz-result-score {
  font-size: 48px;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 8px;
}
.quiz-result-text {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 24px;
}
.quiz-restart {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  padding: 12px 24px;
  border: 2px solid var(--accent);
  border-radius: var(--r2);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
}
.quiz-restart:hover { background: var(--accent-dim); }

/* ═══════════════════════════════════════
   PANEL 4: CHEAT SHEET
   ═══════════════════════════════════════ */
.cheat-section {
  margin-bottom: 28px;
}
.cheat-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cheat-title .ct-icon {
  font-size: 18px;
}
.cheat-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  font-size: 13px;
}
.cheat-table th {
  background: var(--surface2);
  font-weight: 700;
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: .05em;
}
.cheat-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.cheat-table tr:last-child td { border-bottom: none; }
.cheat-table .col-name {
  font-weight: 700;
  white-space: nowrap;
}
.cheat-table .col-sci {
  font-family: var(--mono);
  font-style: italic;
  font-size: 11px;
  color: var(--faint);
}
.cheat-table .col-emoji { font-size: 18px; text-align: center; }
.cheat-table .highlight-cell {
  background: var(--accent-dim);
  font-weight: 600;
  color: var(--accent);
}
.cheat-table .col-group {
  width: 10px;
  padding: 0 6px;
}
.cheat-table .group-bar {
  width: 4px;
  height: 100%;
  min-height: 20px;
  border-radius: 2px;
  display: block;
}

.mnemonic-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--r2);
  padding: 16px 18px;
  margin-bottom: 12px;
}
.mnemonic-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.mnemonic-text {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .03em;
}
.mnemonic-text .char-hl {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 3px;
}
.mnemonic-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.comparison-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
  text-align: center;
}
.comparison-card .cc-label {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--faint);
  margin-bottom: 4px;
}
.comparison-card .cc-name {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 6px;
}
.comparison-card .cc-key {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  display: inline-block;
}

/* ─────────── QUIZ PANEL ─────────── */
(function buildQuiz() {
  const el = document.getElementById('panel-quiz');
  const wrapper = document.createElement('div');
  wrapper.className = 'quiz-wrapper';
  el.appendChild(wrapper);

  let questions = [], currentQ = 0, score = 0, wrong = 0, answered = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    questions = shuffle(QUIZ_BANK).slice(0, 10);
    currentQ = 0; score = 0; wrong = 0; answered = false;
    renderQ();
  }

  function renderQ() {
    if (currentQ >= questions.length) {
      renderResult();
      return;
    }
    const q = questions[currentQ];
    const keys = ['A','B','C','D'];
    const pct = Math.round((currentQ / questions.length) * 100);

    wrapper.innerHTML = `
      <div class="quiz-progress">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div class="quiz-progress-text">${currentQ + 1} / ${questions.length}</div>
      </div>
      <div class="quiz-score">
        <div class="quiz-score-item correct">✓ ${score}</div>
        <div class="quiz-score-item wrong">✗ ${wrong}</div>
      </div>
      <div class="quiz-card">
        <div class="quiz-category">${q.category}</div>
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-options">
          ${q.options.map((o, i) => `
            <button class="quiz-opt" data-idx="${i}">
              <span class="opt-key">${keys[i]}</span>
              <span>${o}</span>
            </button>
          `).join('')}
        </div>
        <div class="quiz-explanation" id="quiz-explain">${q.explain}</div>
        <button class="quiz-next" id="quiz-next-btn">${currentQ < questions.length - 1 ? '다음 문제 →' : '결과 보기'}</button>
      </div>
    `;

    answered = false;
    wrapper.querySelectorAll('.quiz-opt').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn, q));
    });
    document.getElementById('quiz-next-btn').addEventListener('click', () => {
      currentQ++;
      renderQ();
    });
  }

  function handleAnswer(btn, q) {
    if (answered) return;
    answered = true;
    const idx = parseInt(btn.dataset.idx);
    const isCorrect = idx === q.correct;
    if (isCorrect) score++; else wrong++;

    wrapper.querySelectorAll('.quiz-opt').forEach((b, i) => {
      b.classList.add('answered');
      if (i === q.correct) b.classList.add('correct-answer');
      else if (i === idx && !isCorrect) b.classList.add('wrong-answer');
      else b.classList.add('dimmed');
    });

    document.getElementById('quiz-explain').classList.add('show');
    document.getElementById('quiz-next-btn').classList.add('show');

    // update score display
    wrapper.querySelector('.quiz-score-item.correct').textContent = `✓ ${score}`;
    wrapper.querySelector('.quiz-score-item.wrong').textContent = `✗ ${wrong}`;
  }

  function renderResult() {
    const pct = Math.round((score / questions.length) * 100);
    let msg = pct >= 90 ? '완벽해! 🎉' : pct >= 70 ? '거의 다 외웠어! 💪' : pct >= 50 ? '조금만 더! 📚' : '다시 복습하자! 🔄';
    wrapper.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-result-score">${score} / ${questions.length}</div>
        <div class="quiz-result-text">${pct}% 정답 · ${msg}</div>
        <button class="quiz-restart" id="quiz-restart">다시 도전 🔁</button>
      </div>
    `;
    document.getElementById('quiz-restart').addEventListener('click', startQuiz);
  }

  startQuiz();
})();
